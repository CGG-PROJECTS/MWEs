<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MWEs Dashboard</title>
  
  <!-- SheetJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <!-- DataTables CSS & JS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.dataTables.min.css">
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>MWEs Dashboard</h1>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-button active" onclick="openTab(0)">Sheet 1</button>
    <button class="tab-button" onclick="openTab(1)">Sheet 2</button>
  </div>

  <div id="tab0" class="tab-content">
    <div class="table-container">
      <table id="dataTable1" class="display" style="width:100%"></table>
    </div>
  </div>

  <div id="tab1" class="tab-content" style="display:none;">
    <div class="table-container">
      <table id="dataTable2" class="display" style="width:100%"></table>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
